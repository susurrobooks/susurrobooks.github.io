<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — susurro</title>
  <meta name="description" content="susurro에 문의하세요. epub 제작, 변환, 접근성 검사 견적 및 궁금한 점을 남겨주세요.">
  <link rel="stylesheet" href="../assets/css/base.css" />
</head>

<body>
  <div id="header-wrap"></div>

  <main class="content">
    <h2 class="page-title">Contact <span class="susurro2">&nbsp;susurro</span></h2>

    <section class="text-section">
      <p>전자책 제작에 대한 궁금한 점, 견적 문의, 협업 제안까지 편하게 남겨주세요.<br>1~2일 내로 답변드립니다.</p>

      <form class="contact-form" action="https://formspree.io/f/xeevqdna" method="POST">
        <div class="form-group">
          <label for="service">서비스</label>
          <select id="service" name="service" required>
            <option value="" disabled selected>선택해주세요</option>
            <option value="Production">EPUB 제작</option>
            <option value="Conversion">EPUB 변환</option>
            <option value="Accessibility">접근성 검사</option>
            <option value="Other">기타</option>
          </select>
        </div>
        <div class="form-group">
          <label for="name">이름</label>
          <input type="text" id="name" name="name" required placeholder="이름을 입력해주세요">
        </div>
        <div class="form-group">
          <label for="email">이메일</label>
          <input type="email" id="email" name="email" required placeholder="답변 받으실 이메일 주소">
        </div>
        <div class="form-group">
          <label for="message">메시지</label>
          <textarea id="message" name="message" required placeholder="원고 형태, 분량, 납기 등 궁금한 점을 자유롭게 적어주세요." rows="6"></textarea>
        </div>
        <button type="submit" class="submit-btn">보내기</button>
      </form>
    </section>
  </main>

  <div id="footer-wrap"></div>
  <script src="../assets/js/main.js"></script>
</body>

</html>
