<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — susurro</title>
  <meta name="description" content="Get in touch with susurro. Request a quote or ask anything about EPUB production, conversion, or accessibility.">
  <link rel="stylesheet" href="../assets/css/base.css" />
</head>

<body>
  <div id="header-wrap"></div>

  <main class="content">
    <h2 class="page-title">Contact <span class="susurro2">&nbsp;susurro</span></h2>

    <section class="text-section">
      <p>Have a question, a project in mind, or just want to say hello?<br>Leave a message and I'll get back to you within 1–2 days.</p>

      <form class="contact-form" action="https://formspree.io/f/xeevqdna" method="POST">
        <div class="form-group">
          <label for="service">Service</label>
          <select id="service" name="service" required>
            <option value="" disabled selected>Select a service</option>
            <option value="Production">EPUB Production</option>
            <option value="Conversion">EPUB Conversion</option>
            <option value="Accessibility">Accessibility Audit</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required placeholder="Your name">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="Your email address">
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" required placeholder="Tell us about your manuscript, format, deadline, or anything you'd like to know." rows="6"></textarea>
        </div>
        <button type="submit" class="submit-btn">Send</button>
      </form>
    </section>
  </main>

  <div id="footer-wrap"></div>
  <script src="../assets/js/main.js"></script>
</body>

</html>
